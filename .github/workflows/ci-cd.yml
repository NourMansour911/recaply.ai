name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: recaply

    steps:
      - name: Checkout code
        run: echo "Checking out source code..."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        run: echo "Setting up Python 3.11..."

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "Installing dependencies from requirements.txt..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run API tests
        run: |
          echo "Starting tests..."
          pytest -v

      - name: Allow publish only for owner
        run: |
          echo "Verifying who is allowed to publish images..."
          if [ "${{ github.actor }}" != "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "Only the Docker Hub owner can publish images."
            echo "actor=${{ github.actor }}"
            exit 1
          fi

      - name: Log in to Docker Hub
        run: echo "Authenticating with Docker Hub..."

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          echo "Tag (sha): ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Tag (latest): ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          docker build \
            -f docker/api/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker images
        run: |
          echo "Pushing to Docker Hub..."
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest