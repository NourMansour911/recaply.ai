name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test_and_lint:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (Ruff)
        run: ruff check src tests --select E9,F63,F7,F82 --output-format=github

      - name: Run tests
        run: pytest -v

  build-image:
    needs: test_and_lint
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test_and_lint.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          load: true
          tags: |
            recaply:${{ github.sha }}
            recaply:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image artifact
        run: docker save recaply:${{ github.sha }} -o recaply-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: recaply-image-${{ github.sha }}
          path: recaply-image.tar
          if-no-files-found: error