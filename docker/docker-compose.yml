services:
  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/storage
    networks:
      - backend
    restart: always
    env_file:
      - ./env/.env.app
    depends_on:
      - redis
      - mongodb
      - qdrant

  nginx:
    image: nginx:stable-alpine3.20-perl
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - backend
    restart: always

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    volumes:
      - mongodata:/data/db
    networks:
      - backend
    restart: always
    ports:
      - "27017:27017"
    env_file:
      - ./env/.env.mongodb
    command: ["mongod", "--auth"]

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: always



  redis:
    image: redis:7.4
    container_name: chat-redis
    volumes:
      - redis-data:/data
    networks:
      - backend
    restart: always
    env_file:
      - ./env/.env.redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: redis-exporter
    networks:
      - backend
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@redis:6379

  mongodb-exporter:
    image: percona/mongodb_exporter:0.41
    container_name: mongodb-exporter
    networks:
      - backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=${MONGODB_URI}
    command:
      - "--mongodb.uri=${MONGODB_URI}"

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    restart: always
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.0-ubuntu
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    env_file:
      - ./env/.env.grafana
    depends_on:
      - prometheus
    networks:
      - backend
    restart: always

networks:
  backend:
    driver: bridge

volumes:
  mongodata:
  qdrant_data:
  redis-data:
  api_data:
  prometheus_data:
  grafana_data: