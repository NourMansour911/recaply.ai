services:
  mongodb:
    image: mongo:7-jammy
    
    container_name: mongodb
    
    ports:
      - "27007:27017"
    
    volumes:
      - mongodata:/data/db
  
    networks:
      - backend
    
    restart: always



  qdrant:
    image: qdrant/qdrant:v1.17

    container_name: qdrant
    
    ports:
      - "6333:6333"
      - "6334:6334"
    
    volumes:
      - qdrant_data:/qdrant/storage
    
    networks:
      - backend
    
    restart: always


  redis:
    
    image: redis:7.4
    
    container_name: chat-redis
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    command: ["redis-server", "--appendonly", "yes"]

    networks:
      - backend

    restart: always


networks:
  backend:

volumes:
  mongodata:
  qdrant_data:
  redis-data: